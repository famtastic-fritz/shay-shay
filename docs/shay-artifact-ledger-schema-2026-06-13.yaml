schema_version: 1
ledger_name: shay_artifact_ledger
ledger_purpose: Track artifacts created, changed, inspected, or referenced during HyperSwarm mission execution.
status: draft
lineage_defaults:
  plan_id: plan-full-autonomy-completion-2026-06-13
  run_id: run-2026-06-13-full-autonomy-mission-01
required_fields:
  - artifact_id
  - plan_id
  - job_id
  - task_id
  - run_id
  - event_id
  - artifact_type
  - path
  - operation
  - summary
  - status
  - recorded_at
  - redactions
field_definitions:
  artifact_id:
    type: string
  plan_id:
    type: string
  job_id:
    type: string
  task_id:
    type: string
  run_id:
    type: string
  event_id:
    type: string
  related_decision_id:
    type: [string, 'null']
  related_validation_id:
    type: [string, 'null']
  related_gap_id:
    type: [string, 'null']
  artifact_type:
    type: string
    enum: [document, schema, report, evidence, commit, diff, approval_packet, query_example, policy]
  path:
    type: string
  operation:
    type: string
    enum: [created, updated, inspected, referenced]
  summary:
    type: string
  status:
    type: string
    enum: [draft, active, superseded, archived]
  checksum:
    type: [string, 'null']
    description: Optional content hash when needed; do not store raw payload for sensitive artifacts.
  sensitivity:
    type: string
    enum: [public-internal, limited-internal, sensitive-metadata]
  review_required:
    type: boolean
  reviewer_role:
    type: [string, 'null']
  evidence_refs:
    type: array
    items:
      type: string
  tags:
    type: array
    items:
      type: string
  recorded_at:
    type: string
    format: date-time
  redactions:
    type: array
    items:
      type: string
validation_rules:
  - path must be repository-relative or protected pointer syntax
  - summary must describe purpose and outcome, not just file name
  - checksum is optional and should be omitted when it adds no operational value
  - sensitivity sensitive-metadata requires at least one redaction note or protected-pointer explanation
redaction_policy:
  default_mode: redact-first
  forbidden_payloads:
    - raw secrets embedded in artifact metadata
    - private transcript dumps
    - unfiltered runtime logs with credentials
