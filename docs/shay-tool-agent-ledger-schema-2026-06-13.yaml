schema_version: 1
ledger_name: shay_tool_agent_ledger
ledger_purpose: Track tool use, worker roles, execution steps, and bounded runtime telemetry for HyperSwarm mission work.
status: draft
lineage_defaults:
  plan_id: plan-full-autonomy-completion-2026-06-13
  run_id: run-2026-06-13-full-autonomy-mission-01
required_fields:
  - activity_id
  - plan_id
  - job_id
  - task_id
  - run_id
  - event_id
  - lane_id
  - actor_type
  - actor_id
  - tool_name
  - action_summary
  - status
  - started_at
  - touched_resources
  - redactions
field_definitions:
  activity_id:
    type: string
  plan_id:
    type: string
  job_id:
    type: string
  task_id:
    type: string
  run_id:
    type: string
  event_id:
    type: string
  lane_id:
    type: string
  worker_id:
    type: [string, 'null']
  actor_type:
    type: string
    enum: [agent, subagent, human, automation]
  actor_id:
    type: string
  role:
    type: string
  capability_tag:
    type: [string, 'null']
  tool_name:
    type: string
  tool_class:
    type: string
    enum: [read, write, search, terminal, validation, memory, planning]
  action_summary:
    type: string
  command_summary:
    type: [string, 'null']
  status:
    type: string
    enum: [started, completed, partial, failed, blocked, skipped]
  started_at:
    type: string
    format: date-time
  ended_at:
    type: [string, 'null']
    format: date-time
  duration_ms:
    type: [integer, 'null']
    minimum: 0
  touched_resources:
    type: array
    items:
      type: string
  files_read:
    type: array
    items:
      type: string
  files_written:
    type: array
    items:
      type: string
  output_summary:
    type: [string, 'null']
  error_summary:
    type: [string, 'null']
  safety_flags:
    type: array
    items:
      type: string
  validation_refs:
    type: array
    items:
      type: string
  redactions:
    type: array
    items:
      type: string
validation_rules:
  - error_summary is required when status is failed
  - command_summary must be redacted if arguments contain sensitive data
  - touched_resources should identify files, paths, repos, or processes at a summary level
  - files_written must remain empty for read-only tool activity
redaction_policy:
  default_mode: redact-first
  command_capture_rule: Store only command summaries unless a command is already safe and non-sensitive.
